version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/common"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    groups:
      flutter-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        # pigeon's semver-major ignore (below) does not keep it out of this
        # group's recreated PRs — when a grouped dep merges, Dependabot
        # recreates the group and re-widens the pigeon constraint, re-bumping
        # it to 26.x and going red on the setup→setUp break (closed #1106,
        # #1109, #1114). Excluding pigeon from the group keeps the safe
        # minor/patch bumps unblocked; pigeon minor/patch then gets its own
        # PR and its major stays held by the ignore rule. Drop this together
        # with the ignore when the pigeon 26 native migration is scheduled.
        exclude-patterns:
          - "pigeon"
        update-types:
          - "minor"
          - "patch"
      flutter-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # pigeon 26 needs a native Swift/Kotlin codegen migration (Kotlin enum
      # renames + Swift PigeonError collision) that's disproportionate for a
      # dev-only codegen tool; held — see closed PR #1106. Remove this when
      # that migration is scheduled.
      - dependency-name: "pigeon"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    groups:
      android-gradle:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      android-gradle-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/ios/BlockaWebExtension"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    groups:
      safari-extension-npm:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      safari-extension-npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/automation/appium/wdio"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    groups:
      appium-wdio-npm:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      appium-wdio-npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
